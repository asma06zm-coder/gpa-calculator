<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
<div class="container">
    <h1 class="mt-4">GPA Calculator</h1>

    <div class="form-row mb-3">
        <div class="col">
            <input type="text" id="studentName" class="form-control" placeholder="Student Name" required>
        </div>
        <div class="col">
            <input type="text" id="semester" class="form-control" placeholder="Semester (e.g. Fall 2024)" required>
        </div>
    </div>

    <div id="result" class="mt-3"></div>

    <div id="progressSection" class="mb-3" style="display:none;">
        <label>GPA Progress (0 – 4)</label>
        <div class="progress" style="height:25px;">
            <div id="gpaBar" class="progress-bar" role="progressbar" style="width:0%;">0.00</div>
        </div>
    </div>

    <form id="gpaForm" class="mt-3">
        <div id="courses">
            <div class="course-row form-row mb-2">
                <div class="col">
                    <input type="text" name="course[]" class="form-control" placeholder="Course name" required>
                </div>
                <div class="col-2">
                    <input type="number" name="credits[]" class="form-control" placeholder="Credits" min="1" max="10" required>
                </div>
                <div class="col-2">
                    <select name="grade[]" class="form-control">
                        <option value="4.0">A</option>
                        <option value="3.0">B</option>
                        <option value="2.0">C</option>
                        <option value="1.0">D</option>
                        <option value="0.0">F</option>
                    </select>
                </div>
            </div>
        </div>
        <button type="button" id="addCourse" class="btn btn-secondary mb-3">+ Add Course</button><br>
        <button type="submit" class="btn btn-primary">Calculate GPA</button>
        <button type="button" id="showHistory" class="btn btn-info ml-2">View History</button>
    </form>

    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Previous GPA Calculations</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body" id="historyBody">Loading...</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
